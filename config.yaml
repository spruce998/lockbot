# 洛克王国世界自动化助手 - 配置文件

# 游戏窗口设置
game:
  window_title: "洛克王国世界"  # 游戏窗口标题
  capture_region: [0, 0, 1920, 1080]  # 截图区域 [x, y, width, height]，0,0,0,0 表示全屏
  fps: 10  # 截图帧率

# PVP 设置
pvp:
  enabled: true
  confidence_threshold: 0.8  # 识别置信度阈值
  decision_timeout: 25  # 决策时间限制（秒），留 5 秒余量

# 反检测设置
anti_detect:
  enabled: true
  random_delay: [0.1, 0.5]  # 操作随机延迟范围（秒）
  mouse_smooth: true  # 平滑鼠标移动
  human_like_clicks: true  # 拟人化点击（微小偏移）
  active_hours: [8, 23]  # 活跃时间段（小时），避免深夜运行

# 日志设置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/lockbot.log"
  max_size_mb: 10

# 功能开关
features:
  pvp_assist: true
  auto_battle: false  # 暂未实现
  auto_navigation: false  # 暂未实现
  resource_farming: false  # 暂未实现
